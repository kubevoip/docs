name: Pages
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      platform_ref:
        description: Platform repository ref to use for generated reference checks.
        required: false
        default: main
permissions:
  attestations: write
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: kubevoip/kubevoip
          path: _platform
          ref: ${{ github.event.inputs.platform_ref || 'main' }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true
      - run: python -m pip install pyyaml
      - run: python _platform/scripts/export-docs-reference.py --output content/docs/reference/api.md
      - run: git diff --exit-code content/docs/reference/api.md
      - run: npm ci
      - run: npm run build
      - name: Attest Pages artifact contents
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: public/**
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          path: public
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
