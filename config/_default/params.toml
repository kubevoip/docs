  navBarButtonUrl = "/getting-started/quickstart/"
  navBarButtonText = "Quickstart"
  showSearch = []
  searchExclKinds = []
  searchExclTypes = []
  sectionSwitcher = false
  sectionNav = ["docs"]
  toTopButton = true
  breadcrumbTrail = true
  headlineHash = true
  scrollSpy = true
